// ─────────────────────────────────────────────────────────────────────────────
// FIREBASE DATA LAYER
// All data mutations route through DB.sync(), which pushes the
// serialised data state to Firebase when connected.
// Incoming Firebase changes are merged back into S and trigger re-render.
// ─────────────────────────────────────────────────────────────────────────────
const DB={
  ref:null,           // firebase.database().ref('choretracker')
  connected:false,    // true once onValue fires at least once
  syncing:false,      // true while a write is in flight
  syncTimer:null,

  // ── Serialise data state for Firebase ──
  serialise(){
    return{
      children:S.children,
      tasks:S.tasks,
      jobs:S.jobs,
      done:[...S.done],
      expired:[...S.expired],
      earnings:S.earnings,
      infractions:S.infractions,
      notifications:S.notifications,
      passages:S.passages,
      config:{
        parentPin:S.parentPin,
        defaultPenalty:S.defaultPenalty,
        parentPhone:S.parentPhone
        // NOTE: S.apiKey is intentionally NOT synced to Firebase —
        // keep API keys out of shared databases.
      }
    };
  },

  // ── Merge incoming Firebase snapshot into S ──
  merge(data){
    if(!data)return;
    if(data.children)  S.children=data.children;
    if(data.tasks)     S.tasks=data.tasks;
    if(data.jobs)      S.jobs=data.jobs;
    if(data.done)      S.done=new Set(data.done);
    if(data.expired)   S.expired=new Set(data.expired);
    if(data.earnings)  S.earnings=data.earnings;
    if(data.infractions)  S.infractions=data.infractions;
    if(data.notifications)S.notifications=data.notifications;
    if(data.passages)  S.passages=data.passages;
    if(data.config){
      if(data.config.parentPin)     S.parentPin=data.config.parentPin;
      if(data.config.defaultPenalty!=null)S.defaultPenalty=data.config.defaultPenalty;
      if(data.config.parentPhone)   S.parentPhone=data.config.parentPhone;
    }
    // Regenerate uid counter safely above all existing IDs
    const allIds=[
      ...S.children.map(x=>x.id),
      ...S.tasks.map(x=>x.id),
      ...S.jobs.map(x=>x.id),
      ...S.infractions.map(x=>x.id),
      ...S.notifications.map(x=>x.id),
    ].filter(Number.isFinite);
    if(allIds.length)uid=Math.max(uid,...allIds)+1;
  },

  // ── Debounced write — called after every render ──
  schedule(){
    if(!DB.ref)return;
    clearTimeout(DB.syncTimer);
    DB.syncTimer=setTimeout(()=>{
      if(!DB.ref)return;
      DB.syncing=true;
      DB.ref.set(DB.serialise())
        .then(()=>{DB.syncing=false;updateSyncDot();})
        .catch(()=>{DB.syncing=false;updateSyncDot();});
    },600);
  },

  // ── Start listening for remote changes ──
  listen(){
    if(!DB.ref)return;
    DB.ref.on('value',snapshot=>{
      DB.connected=true;
      const data=snapshot.val();
      // Only merge if the data came from another device
      // (skip when this device just wrote it)
      if(data)DB.merge(data);
      updateSyncDot();
      render();
    },()=>{DB.connected=false;updateSyncDot();});
  },
};

function updateSyncDot(){
  const dot=document.getElementById('fbDot');
  if(!dot)return;
  if(!FIREBASE_ON){dot.style.display='none';return;}
  dot.style.display='block';
  dot.style.background=DB.connected?(DB.syncing?'#FF9500':'#34C759'):'#FF3B30';
  dot.title=DB.connected?(DB.syncing?'Syncing…':'Synced'):'Connecting…';
}

// ── Initialise Firebase after SDK loads ──
function initFirebase(){
  if(!FIREBASE_ON)return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.database();
    DB.ref=db.ref('choretracker');
    DB.listen();
  }catch(e){
    console.error('Firebase init failed:',e);
  }
}

let mediaRec=null,audioChunks=[],recSec=0,recInt=null,recTaskId=null,recChildId=null;
async function startRecording(taskId,childId){
  if(mediaRec&&mediaRec.state==='recording')return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    const mt=['audio/mp4','audio/aac','audio/webm','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    mediaRec=new MediaRecorder(stream,mt?{mimeType:mt}:{});
    audioChunks=[];recSec=0;recTaskId=taskId;recChildId=childId;
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstop=()=>{
      const blob=new Blob(audioChunks,{type:mediaRec.mimeType||'audio/mp4'});
      const url=URL.createObjectURL(blob);
      const key=`${recChildId}-${recTaskId}`;
      const ch=S.children.find(c=>c.id===recChildId),tk=S.tasks.find(t=>t.id===recTaskId);
      S.recordings[key]={url,duration:recSec,date:new Date().toLocaleString(),childName:ch?.name||'',taskName:tk?.name||'Reading'};
      stream.getTracks().forEach(t=>t.stop());clearInterval(recInt);recInt=null;
      patchRecBar(taskId,childId,'saved');
    };
    mediaRec.start(250);
    recInt=setInterval(()=>{recSec++;const el=document.getElementById('recTimer');if(el)el.textContent=fmtSec(recSec);},1000);
    patchRecBar(taskId,childId,'recording');
  }catch(e){alert('Microphone access required.');}
}
function stopRecording(){if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();}
function patchRecBar(tid,cid,state){const el=document.getElementById('recBar');if(el)el.innerHTML=buildRecBar(tid,cid,state,S.recordings[`${cid}-${tid}`]);}

// AI READING GENERATION
// ─────────────────────────────────────────────────────────────────────────────
async function generateReading(taskId){
  const keyword=(S.genKeyword[taskId]||'').trim();
  if(!keyword){alert('Enter a topic keyword first.');return;}
  if(!S.apiKey||S.apiKey.length<10){alert('Enter your Anthropic API key in Settings first.');return;}
  S.genLoading=true;S.genTargetTask=taskId;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-opus-4-6',max_tokens:2000,
        system:`You generate reading passages for 12-year-old students. Respond ONLY with valid JSON — no markdown, no backticks, nothing else.
Format: {"title":"string","level":"Age 12 · Reading Assignment · ~12 min","paragraphs":["p1",...12 total]}
Each paragraph: 100-130 words, clear engaging prose.`,
        messages:[{role:'user',content:`Write a 12-paragraph reading passage about: "${keyword}". Educational, engaging, age-12 appropriate.`}]
      })
    });
    if(!res.ok){const err=await res.json();throw new Error(err?.error?.message||`API error ${res.status}`);}
    const data=await res.json();
    const text=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const json=text.replace(/^[^{]*/,'').replace(/[^}]*$/,'');
    const parsed=JSON.parse(json);
    if(!parsed.title||!Array.isArray(parsed.paragraphs))throw new Error('Invalid response structure');
    S.passages[taskId]=parsed;
    alert(`✅ Generated!\n"${parsed.title}"\n${parsed.paragraphs.length} paragraphs ready.`);
  }catch(err){alert(`Generation failed: ${err.message}\n\nCheck your API key in Settings.`);}
  S.genLoading=false;S.genTargetTask=null;render();
}

// ─────────────────────────────────────────────────────────────────────────────
let expiryInt=null;
function startExpiryEngine(){checkExpiry();expiryInt=setInterval(checkExpiry,30000);}
function checkExpiry(){
  const now=new Date();let changed=false;
  S.tasks.forEach(task=>{
    if(!task.due)return;
    const due=new Date(task.due);if(isNaN(due)||due>now)return;
    const kids=task.to==='all'?S.children:S.children.filter(c=>c.id===task.to);
    kids.forEach(child=>{
      const key=`${child.id}-${task.id}`;
      if(S.done.has(key)||S.expired.has(key))return;
      S.expired.add(key);
      const penalty=parseFloat(task.penalty||S.defaultPenalty||0);
      S.earnings[child.id]=Math.max(0,(S.earnings[child.id]||0)-penalty);
      const msg=`⚠️ Missed: ${child.name} did not complete "${task.name}" by ${fmtDT(task.due)}.${penalty>0?` $${penalty.toFixed(2)} deducted.`:''}`;
      S.infractions.unshift({id:++uid,childId:child.id,childName:child.name,taskId:task.id,taskName:task.name,time:now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),penalty,msg});
      S.notifications.unshift({id:++uid,type:'missed',msg,sent:false});
      changed=true;
    });
  });
  if(changed)render();
}

function tstr(){const d=new Date(),h=d.getHours(),m=d.getMinutes();return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;}
function fmtDT(dt){if(!dt)return'--';const d=new Date(dt);return isNaN(d)?'--':d.toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function duelbl(dt){
  if(!dt)return'No due date';const now=new Date(),d=new Date(dt);
  if(isNaN(d))return'No due date';if(d<=now)return'Past due';
  const diff=Math.floor((d-now)/60000);if(diff<60)return`Due in ${diff}m`;
  const h=Math.floor(diff/60);if(h<24)return`Due in ${h}h${diff%60?` ${diff%60}m`:''}`;
  return d.toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function ini(n){return n.trim().split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function jcol(i){return JC[i%JC.length];}

function fmtSec(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function isDone(cid,tid){return S.done.has(`${cid}-${tid}`);}

function buildProgBar(task){
  if(!task.due)return'';
  const now=Date.now(),dueMs=new Date(task.due).getTime();if(isNaN(dueMs))return'';
  const totalMs=Math.max(dueMs-APP_START,1),remainMs=Math.max(0,dueMs-now);
  const pct=Math.min(100,Math.max(0,(remainMs/totalMs)*100));
  const color=pct>60?'#34C759':pct>30?'#FF9500':'#FF3B30';
  const hrs=Math.floor(remainMs/3600000),mins=Math.floor((remainMs%3600000)/60000);
  const timeStr=hrs>0?`${hrs}h ${mins}m left`:mins>0?`${mins}m left`:'Due very soon';
  return`<div class="prog-wrap">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <span style="font-size:13px;color:#8E8E93;text-transform:uppercase;letter-spacing:.06em;font-weight:500">Time remaining</span>
      <span id="progLbl" style="font-size:15px;font-weight:600;color:${color}">${timeStr}</span>
    </div>
    <div class="prog-track"><div id="progFill" class="prog-fill" style="width:${pct.toFixed(1)}%;background:${color}"></div></div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:11px;color:#C7C7CC">Now</span>
      <span style="font-size:11px;color:#C7C7CC">Due ${fmtDT(task.due)}</span>
    </div>
  </div>`;
}
function updateProgBar(task){
  const fill=document.getElementById('progFill'),lbl=document.getElementById('progLbl');
  if(!fill||!task?.due)return;
  const now=Date.now(),dueMs=new Date(task.due).getTime();if(isNaN(dueMs))return;
  const totalMs=Math.max(dueMs-APP_START,1),remainMs=Math.max(0,dueMs-now);
  const pct=Math.min(100,Math.max(0,(remainMs/totalMs)*100));
  const color=pct>60?'#34C759':pct>30?'#FF9500':'#FF3B30';
  const hrs=Math.floor(remainMs/3600000),mins=Math.floor((remainMs%3600000)/60000);
  fill.style.width=pct.toFixed(1)+'%';fill.style.background=color;
  if(lbl){lbl.textContent=hrs>0?`${hrs}h ${mins}m left`:mins>0?`${mins}m left`:'Due very soon';lbl.style.color=color;}
}

  sig:`<svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="3" width="2.5" height="9" rx="1" fill="#1C1C1E"/><rect x="4" y="1.5" width="2.5" height="10.5" rx="1" fill="#1C1C1E"/><rect x="8" y="0" width="2.5" height="12" rx="1" fill="#1C1C1E"/><rect x="12" y="0" width="2.5" height="12" rx="1" fill="#1C1C1E" opacity=".3"/></svg>`,

};

// ─────────────────────────────────────────────────────────────────────────────
// RENDER — every render schedules a debounced Firebase push
// ─────────────────────────────────────────────────────────────────────────────
function render(){
  buildTopBar();
  document.getElementById('app').innerHTML=S.view==='parent'?buildParent():buildChild();
  DB.schedule(); // ← debounced Firebase push after every state change
  updateSyncDot();
}

function buildTopBar(){
  const tb=document.getElementById('topBar');
  if(S.deviceChild!==null){
    const ch=S.children.find(c=>c.id===S.deviceChild);
    tb.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex:1;justify-content:center">
      <div style="display:flex;align-items:center;gap:6px;background:#fff;border-radius:22px;padding:8px 16px;border:1px solid #C7C7CC">
        <span style="color:#FF9500">${I.lock.replace(/currentColor/g,'#FF9500')}</span>
        <span style="font-size:15px;font-weight:500;color:#1C1C1E">${ch?ch.name+"'s Device":'Locked'}</span>
      </div>
      <button class="mbb off" onclick="askPin(unlockDevice)" style="font-size:13px;padding:7px 14px;display:flex;align-items:center;gap:5px">${I.lock.replace(/currentColor/g,'#8E8E93')} Parent</button>
    </div>`;return;
  }
  tb.innerHTML=`
    <button class="mbb ${S.view==='parent'?'on':'off'}" onclick="sv('parent')">Parent</button>
    <button class="mbb ${S.view==='child'?'on':'off'}" onclick="sv('child')">Child View</button>
    ${S.view==='child'?`<select class="csel" onchange="setKid(+this.value)">${S.children.map(c=>`<option value="${c.id}"${c.id===S.childId?' selected':''}>${c.name}</option>`).join('')}</select>`:''}`;
}

function buildParent(){
  const infCnt=S.infractions.length,ntfCnt=S.notifications.filter(n=>!n.sent).length;

  return`<div class="sb">

  ${S.ptab==='tasks'?buildPTasks():S.ptab==='jobs'?buildPJobs():S.ptab==='earn'?buildEarnings():S.ptab==='read'?buildRecordings():S.ptab==='notif'?buildNotifications():S.ptab==='infr'?buildInfractions():buildPKids()}

function ptab(key,icon,label,badge){
  const on=S.ptab===key;
  return`<button class="ti" onclick="setPtab('${key}')">
    <div class="ti-ic" style="color:${on?'#007AFF':'#8E8E93'}">${icon}</div>
    <span class="ti-lb" style="color:${on?'#007AFF':'#8E8E93'}">${label}</span>
    ${badge?`<span class="badge">${badge}</span>`:''}
  </button>`;
}

function buildPTasks(){

          ${t.to==='all'?`<span style="background:#FEF9C3;color:#92400E;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px">All</span>`:''}

            <span style="font-size:12px;color:#8E8E93">Pay</span>

function buildEarnings(){
  const total=S.children.reduce((s,c)=>s+(S.earnings[c.id]||0),0);
  const rows=S.children.map((c,i)=>{
    const cbg=CAVBG[i%CAVBG.length],ctx=CAVTX[i%CAVTX.length];
    const amt=S.earnings[c.id]||0;
    const choreDone=S.tasks.filter(t=>(t.to===c.id||t.to==='all')&&t.pay&&t.amt&&isDone(c.id,t.id)).length;
    const jobDone=S.jobs.filter(j=>j.claimedBy===c.id&&j.done).length;
    const miss=S.infractions.filter(x=>x.childId===c.id).length;
    return`<div class="earn-row">
      <div class="av" style="background:${cbg};color:${ctx}">${ini(c.name)}</div>
      <div style="flex:1;min-width:0;margin:0 10px">
        <div style="font-size:15px;color:#1C1C1E;font-weight:500">${c.name}</div>
        <div style="font-size:12px;color:#8E8E93;margin-top:2px">${choreDone} chore${choreDone!==1?'s':''} · ${jobDone} job${jobDone!==1?'s':''} done${miss?` · <span style="color:#FF3B30">${miss} missed</span>`:''}</div>
      </div>
      ${amt>0?`<div style="margin-right:10px"><div style="font-size:20px;font-weight:700;color:#166534">$${fmtAmt(amt)}</div></div><button class="pay-btn" onclick="resetEarnings(${c.id})">Paid ✓</button>`:`<div style="font-size:20px;font-weight:700;color:#C7C7CC">$0.00</div>`}
    </div>`;
  }).join('');
  return`<div class="sec-hd">Accrued Earnings</div>
  <div class="earn-card">${rows}</div>
  ${total>0?`<div style="margin:0 16px 10px;background:#F0FDF4;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:14px;color:#166534;font-weight:500">Total owed</span>
    <span style="font-size:22px;font-weight:700;color:#166534">$${fmtAmt(total)}</span>
  </div>`:''}`;
}

    return`<div class="infr-row">

function buildPKids(){

        <button onclick="rmKid(${c.id})" style="color:#FF3B30;background:none;border:none;font-size:13px;cursor:pointer;font-family:inherit;padding:4px">✕</button>

function buildChild(){
  const cid=S.deviceChild!==null?S.deviceChild:S.childId;
  if(S.cscreen==='detail'){
    if(S.detailType==='job'){const job=S.jobs.find(j=>j.id===S.detailId);return buildJobDetail(job,cid);}
    const task=S.tasks.find(t=>t.id===S.detailId);
    if(task&&task.reading)return buildReadingView(task,cid);
    return buildDetail(task,cid);
  }
  if(S.cscreen==='code')return buildCodeEntry();
  return buildGrid(cid);
}

function buildCodeEntry(){
  return`<div style="padding:80px 24px;text-align:center">
    <div style="font-size:48px;margin-bottom:16px">🔐</div>
    <div style="font-size:22px;font-weight:700;color:#1C1C1E;margin-bottom:8px">Enter your code</div>
    <div style="font-size:15px;color:#8E8E93;margin-bottom:28px">Ask a parent for your code</div>
    <input id="codeInp" style="width:100%;padding:14px;font-size:26px;text-align:center;letter-spacing:.3em;text-transform:uppercase;font-weight:600;border:.5px solid #C7C7CC;border-radius:14px;font-family:inherit;outline:none;background:#fff" maxlength="6" placeholder="L291" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')submitCode()">
    <button onclick="submitCode()" class="done-btn" style="margin-top:16px">Confirm</button>
    <div id="codeErr" style="color:#FF3B30;font-size:13px;margin-top:12px;display:none">Code not recognised</div>
    <button onclick="S.cscreen='grid';render()" style="display:block;margin:16px auto 0;background:none;border:none;color:#8E8E93;font-size:14px;cursor:pointer;font-family:inherit">Cancel</button>
  </div>`;
}
function submitCode(){
  const v=(document.getElementById('codeInp')?.value||'').trim().toUpperCase();
  const child=S.children.find(c=>c.code===v);
  if(!child){document.getElementById('codeErr').style.display='block';return;}
  S.deviceChild=child.id;S.childId=child.id;S.cscreen='grid';reqWL();render();
}

function buildGrid(cid){
  const child=S.children.find(c=>c.id===cid);
  if(!child)return`<div style="padding:60px 20px;text-align:center;color:#8E8E93">Select a child above</div>`;
  const mine=S.tasks.filter(t=>t.to===cid||t.to==='all');
  const earned=S.earnings[cid]||0;
  const availableJobs=S.jobs.filter(j=>!j.claimedBy&&!j.done);
  const myJobs=S.jobs.filter(j=>j.claimedBy===cid&&!j.done);
  const wakeStr=wlActive?`<div class="wl-pill"><div class="wl-dot"></div><span>Screen stays on</span></div>`:'';
  const fbStr=FIREBASE_ON&&DB.connected?`<div class="wl-pill" style="background:rgba(79,70,229,.08)"><div class="wl-dot" style="background:#4F46E5"></div><span style="color:#4338CA">Live sync active</span></div>`:'';

  const taskBlocks=mine.map(t=>{
    const ci=tcidx(t);const done=isDone(cid,t.id);const exp=isExpired(cid,t.id);const photo=S.taskPhotos[t.id];
    const bgStyle=photo?`background-image:url(${photo});background-size:cover;background-position:center`:`background:${tcol(ci)}`;
    return`<div class="tb2${exp&&!done?' exp-blink':''}" style="${bgStyle}" ${done||exp?'':` onclick="openDetail(${t.id},'task')"`}>
      ${photo?`<div class="tb2-shade"></div>`:''}
      <div class="tb2-content">
        <div class="tb2-ico">${t.reading?I.book:I.clk}</div>
        <div><div class="tb2-n">${t.name}</div><div class="tb2-d">${t.reading?'Tap to read &amp; record':duelbl(t.due)}</div></div>
      </div>
      ${done?`<div class="tb2-ov" style="background:rgba(0,0,0,.4)">${I.chk}</div>`:''}
      ${exp&&!done?`<div class="tb2-ov" style="background:rgba(185,28,28,.65)"><div style="text-align:center"><div style="font-size:28px">⚠️</div><div style="color:#fff;font-size:13px;font-weight:700;margin-top:4px">TIME UP</div></div></div>`:''}
    </div>`;
  }).join('');

  const myJobBlocks=myJobs.map(j=>{
    const ci=jcidx(j);const photo=S.jobPhotos[j.id];
    const bgStyle=photo?`background-image:url(${photo});background-size:cover;background-position:center`:`background:${jcol(ci)}`;
    return`<div class="tb2" style="${bgStyle}" onclick="openDetail(${j.id},'job')">
      ${photo?`<div class="tb2-shade"></div>`:''}
      <div class="tb2-content">
        <div class="tb2-ico" style="font-size:22px">⭐</div>
        <div><div class="tb2-n">${j.title}</div><div class="tb2-d">Your job · ${j.pay?`Earn $${j.pay}`:duelbl(j.due)}</div></div>
      </div>
    </div>`;
  }).join('');

  const jobBoardBlocks=availableJobs.map(j=>{
    const ci=jcidx(j);const photo=S.jobPhotos[j.id];
    const bgStyle=photo?`background-image:url(${photo});background-size:cover;background-position:center;`:`background:${jcol(ci)};`;
    return`<div class="jb2" style="${bgStyle}" onclick="openDetail(${j.id},'job')">
      ${photo?`<div class="tb2-shade" style="border-radius:24px"></div>`:''}
      <div style="position:relative;z-index:1;display:flex;flex-direction:column;height:100%">
        <div class="jb2-pill">⭐ JOB BOARD</div>
        <div style="margin-top:auto">
          <div class="jb2-n">${j.title}</div>
          ${j.pay?`<div class="jb2-pay">Earn $${j.pay}</div>`:''}
          <div class="jb2-d">${duelbl(j.due)}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return`<div class="sb"><span class="sb-t" id="sbt">${tstr()}</span><div class="sb-i">${I.sig}${I.bat}</div></div>
  <div class="nb">
    <div class="nb-sd"></div><span class="nb-t">${child.name}'s Tasks</span>
    <div class="nb-sd" style="text-align:right">
      ${S.deviceChild===null?`<button onclick="S.cscreen='code';render()" style="color:#007AFF;background:none;border:none;font-size:13px;cursor:pointer;font-family:inherit;padding:4px 8px">My Code</button>`:''}
    </div>
  </div>
  ${wakeStr}${fbStr}
  ${(earned>0||mine.some(t=>t.pay&&t.amt)||myJobs.length)?`
  <div class="kid-earn-banner">
    <div>
      <div style="font-size:12px;color:#166534;text-transform:uppercase;letter-spacing:.06em;font-weight:500">Earned so far</div>
      <div style="font-size:28px;font-weight:700;color:#166534;margin-top:3px">$${fmtAmt(earned)}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:12px;color:#4ADE80">${mine.filter(t=>isDone(cid,t.id)).length} of ${mine.length} done</div>
      <div style="width:80px;height:6px;background:rgba(74,222,128,.2);border-radius:3px;margin-top:6px;overflow:hidden">
        <div style="height:100%;width:${mine.length?Math.round(mine.filter(t=>isDone(cid,t.id)).length/mine.length*100):0}%;background:#34C759;border-radius:3px"></div>

    </div>

  ${(mine.length||myJobs.length)?`<div class="tg">${taskBlocks}${myJobBlocks}</div>`:`<div style="padding:40px 20px 16px;text-align:center;color:#8E8E93;font-size:15px">No tasks assigned yet!</div>`}
  ${availableJobs.length?`
  <div class="jb-section-hd">
    <span class="jb-section-title">Job Board</span>
    <span class="jb-count">${availableJobs.length} open</span>
  </div>
  <div style="padding:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:12px">${jobBoardBlocks}</div>`:''}`;
}

  const bgStyle=photo?`background-image:url(${photo});background-size:cover;background-position:center;background-color:${jcol(ci)}`:`background:${jcol(ci)}`;
  const isMine=job.claimedBy===cid;
  return`<div class="dh" style="${bgStyle}">
    ${photo?`<div class="dh-shade"></div>`:''}
    <button class="dh-bk" onclick="goBack()">${I.bk} Back</button>
    <div class="dh-content">
      <div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;color:#fff;margin-bottom:8px">⭐ JOB BOARD</div>
      <div class="dh-t">${job.title}</div>
      ${job.desc?`<div class="dh-sub">${job.desc}</div>`:''}

      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2v16M7 5.5c0-1.1.9-2 3-2s3 1 3 2.2-1 2.2-3 2.8-3 1.7-3 3c0 1.2 1.2 2.5 3 2.5s3-1 3-2.5" stroke="#C2410C" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span style="font-size:15px;color:#C2410C;font-weight:600">Complete to earn $${parseFloat(job.pay).toFixed(2)}</span>

        <span style="font-size:20px">⭐</span> Claim This Job

function buildDetail(task,cid){
  if(!task)return buildGrid(cid);
  const ci=tcidx(task);const done=isDone(cid,task.id);const exp=isExpired(cid,task.id);const earned=S.earnings[cid]||0;
  const photo=S.taskPhotos[task.id];
  const bgStyle=photo?`background-image:url(${photo});background-size:cover;background-position:center;background-color:${tcol(ci)}`:`background:${tcol(ci)}`;
  return`<div class="dh" style="${bgStyle}">
    ${photo?`<div class="dh-shade"></div>`:''}
    <button class="dh-bk" onclick="goBack()">${I.bk} Back</button>
    <div class="dh-content"><div class="dh-t">${task.name}</div>${task.notes?`<div class="dh-sub">${task.notes}</div>`:''}</div>
  </div>
  <div class="db">
    ${exp&&!done?`<div style="background:#FEF2F2;border-radius:16px;padding:16px;text-align:center;margin-bottom:12px">
      <div style="font-size:28px;margin-bottom:6px">⚠️</div>
      <div style="font-size:16px;font-weight:600;color:#DC2626">Task Missed</div>
      <div style="font-size:13px;color:#EF4444;margin-top:4px">${task.penalty?`$${fmtAmt(task.penalty)} deducted`:'Not completed on time'}</div>
    </div>`:buildProgBar(task)}
    ${task.pay&&task.amt&&!exp?`<div style="background:#F0FDF4;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px">${I.dol}<span style="font-size:15px;color:#166534;font-weight:500">Complete to earn $${parseFloat(task.amt).toFixed(2)}</span></div>`:''}
    ${earned>0?`<div style="background:#F0FDF4;border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:#166534">Total earned today</span>
      <span style="font-size:17px;font-weight:700;color:#166534">$${fmtAmt(earned)}</span>

function buildReadingView(task,cid){

  const hdBg=photo?`background-image:url(${photo});background-size:cover;background-position:center;background-color:${tcol(ci)}`:`background:${tcol(ci)}`;
  if(!passage){
    return`<div class="dh" style="${hdBg}">${photo?`<div class="dh-shade"></div>`:''}
      <button class="dh-bk" onclick="goBack()">${I.bk} Back</button>
      <div class="dh-content"><div class="dh-t">${task.name}</div></div>
    </div>
    <div class="db" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">📖</div>
      <div style="font-size:17px;font-weight:600;color:#1C1C1E;margin-bottom:8px">Reading not yet generated</div>
      <div style="font-size:14px;color:#8E8E93;line-height:1.6">Ask your parent to generate reading content in the Parent Dashboard → Chores.</div>
    </div>`;
  }
  const paras=passage.paragraphs.map((p,i)=>`<div style="margin-bottom:28px">
    <div style="font-size:11px;color:#C7C7CC;text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:6px">Paragraph ${i+1}</div>
    <div class="reading-para">${p}</div>
  </div>`).join('');
  return`<div style="padding:0 0 180px">
    <div class="reading-header" style="${hdBg}">
      ${photo?`<div class="dh-shade"></div>`:''}
      <button class="dh-bk" onclick="goBack()">${I.bk} Back</button>
      <div style="position:relative;z-index:1;padding-top:20px">
        <div style="font-size:12px;color:rgba(255,255,255,.75);margin-bottom:6px">${passage.level}</div>
        <div class="reading-title">${passage.title}</div>
      </div>
    </div>
    <div style="padding:24px 20px 0">${paras}</div>
    ${task.pay&&task.amt&&!done?`<div style="margin:0 20px 20px;background:#F0FDF4;border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px">${I.dol}<span style="font-size:14px;color:#166534;font-weight:500">Earn $${parseFloat(task.amt).toFixed(2)} when you finish &amp; record</span></div>`:''}
    ${done?`<div style="margin:0 20px 180px;padding:16px;background:#F0FDF4;border-radius:16px;text-align:center;font-size:16px;font-weight:600;color:#166534">✓ Reading Complete!</div>`:''}
  </div>
  <div class="rec-bar" id="recBar">${buildRecBar(task.id,cid,existing?'saved':'idle',existing)}</div>`;
}

function buildRecBar(taskId,cid,state,existing){
  const done=isDone(cid,taskId);
  if(done)return`<div style="flex:1;text-align:center;font-size:15px;font-weight:600;color:#34C759">✓ Assignment Complete</div>`;
  const isRec=state==='recording',isSaved=state==='saved';
  return`<button class="rec-btn ${isRec?'recording':isSaved?'saved':'idle'}" onclick="${isRec?'stopRecording()':'startRecording('+taskId+','+cid+')'}" title="${isRec?'Stop':'Record'}">
    ${isRec?`<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="3" fill="#fff"/></svg>`:
    `<svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="7" y="2" width="8" height="12" rx="4" fill="#fff"/><path d="M3 11a8 8 0 0 0 16 0" stroke="#fff" stroke-width="1.5" stroke-linecap="round" fill="none"/><line x1="11" y1="19" x2="11" y2="22" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>`}
  </button>
  <div class="rec-info">
    <div class="rec-label">${isRec?'Recording…':isSaved?'Recording saved':'Press to record your reading'}</div>
    <div class="rec-timer" id="recTimer">${isRec?fmtSec(recSec):existing?fmtSec(existing.duration):'00:00'}</div>
    ${isRec?`<div style="font-size:12px;color:#FF3B30;font-weight:500;margin-top:2px">● Live</div>`:isSaved?`<div style="font-size:12px;color:#34C759;font-weight:500;margin-top:2px">Saved</div>`:''}
  </div>
  ${(isSaved||existing)&&!done?`<button class="rec-done-btn" onclick="markDone(${taskId},${cid})">Mark Done</button>`:''}`;
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS  (all data mutations call render() which triggers DB.schedule())
// ─────────────────────────────────────────────────────────────────────────────
function sv(v){S.view=v;S.cscreen='grid';S.detailId=null;stopTimer();if(v==='child')reqWL();else relWL();render();scrollTop();}
function setKid(id){S.childId=id;S.cscreen='grid';S.detailId=null;render();scrollTop();}
function setPtab(t){S.ptab=t;render();scrollTop();}
function openDetail(id,type){S.detailId=id;S.detailType=type||'task';S.cscreen='detail';render();scrollTop();
  if(type!=='job'){const task=S.tasks.find(t=>t.id===id);if(task&&!task.reading)startTimer();}else startTimer();
}
function goBack(){if(mediaRec&&mediaRec.state==='recording')mediaRec.stop();S.cscreen='grid';S.detailId=null;stopTimer();render();scrollTop();}
function scrollTop(){setTimeout(()=>{document.getElementById('sc').scrollTop=0;},0);}

// Tasks
function assignT(tid,val){const t=S.tasks.find(x=>x.id===tid);if(t)t.to=isNaN(+val)?val:+val;render();}
function setDue(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t)t.due=v;render();}
function togglePay(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t)t.pay=v;render();}
function toggleReading(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t){t.reading=v;if(v&&S.passages[tid]===undefined)S.passages[tid]=null;}render();}
function setAmt(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t)t.amt=v;}
function setPenalty(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t)t.penalty=+v||0;}
function setNotes(tid,v){const t=S.tasks.find(x=>x.id===tid);if(t)t.notes=v;}
function rmTask(tid){S.tasks=S.tasks.filter(t=>t.id!==tid);delete S.passages[tid];delete S.taskPhotos[tid];render();}
function addTask(){const v=S.newTname.trim();if(!v)return;const id=++uid;S.tasks.push({id,name:v,to:null,due:todayDT('18:00'),pay:false,amt:'',penalty:S.defaultPenalty,reading:false,notes:''});S.newTname='';render();}
function startTaskEdit(id,name){S.editTid=id;S.editTval=name.trim();render();setTimeout(()=>{const el=document.getElementById('et_'+id);if(el){el.focus();el.select();}},0);}
function saveTaskEdit(id){const el=document.getElementById('et_'+id);const v=(el?el.value:S.editTval).trim();if(v){const t=S.tasks.find(x=>x.id===id);if(t)t.name=v;}S.editTid=null;render();}

// Jobs
function addJob(){const v=S.newJobTitle.trim();if(!v)return;S.jobs.push({id:++uid,title:v,desc:'',pay:'5',penalty:0,due:todayDT('20:00'),claimedBy:null,claimedAt:null,done:false});S.newJobTitle='';render();}
function updateJob(jid,field,val){const j=S.jobs.find(x=>x.id===jid);if(j){j[field]=val;render();}}
function rmJob(jid){S.jobs=S.jobs.filter(j=>j.id!==jid);delete S.jobPhotos[jid];render();}
function claimJob(jid,cid){
  const job=S.jobs.find(j=>j.id===jid);if(!job||job.claimedBy)return;
  job.claimedBy=cid;job.claimedAt=new Date().toISOString();
  const child=S.children.find(c=>c.id===cid);
  S.notifications.unshift({id:++uid,type:'done',msg:`⭐ Job claimed!\n${child?.name||''} claimed "${job.title}"${job.pay?` (worth $${job.pay})`:''}. Removed from other kids' boards.`,sent:false});
  S.cscreen='grid';render();
}
function markJobDone(jid,cid){
  const job=S.jobs.find(j=>j.id===jid);if(!job)return;
  job.done=true;
  if(job.pay&&cid)S.earnings[cid]=(S.earnings[cid]||0)+parseFloat(job.pay||0);
  const child=S.children.find(c=>c.id===cid);
  notifyDone(child?.name||'',job.title,job.pay,true);
  stopTimer();render();
}
function unclaim(jid){const j=S.jobs.find(x=>x.id===jid);if(j){j.claimedBy=null;j.claimedAt=null;}render();}
function resetJob(jid){const j=S.jobs.find(x=>x.id===jid);if(j){j.claimedBy=null;j.claimedAt=null;j.done=false;}render();}

// Kids
function startEdit(id,name){S.editCid=id;S.editCval=name.trim();render();setTimeout(()=>{const el=document.getElementById('ec_'+id);if(el){el.focus();el.select();}},0);}
function saveEdit(id){const el=document.getElementById('ec_'+id);const v=(el?el.value:S.editCval).trim();if(v){const c=S.children.find(x=>x.id===id);if(c)c.name=v;}S.editCid=null;render();}
function cancelEdit(){S.editCid=null;render();}
function rmKid(id){S.children=S.children.filter(c=>c.id!==id);S.tasks.forEach(t=>{if(t.to===id)t.to=null;});if(S.childId===id&&S.children.length)S.childId=S.children[0].id;if(S.deviceChild===id)S.deviceChild=null;render();}
function addKid(){const v=S.newCval.trim();if(!v)return;const code=v[0].toUpperCase()+String(Math.floor(100+Math.random()*900));const id=++uid;S.children.push({id,name:v,code});S.earnings[id]=0;S.newCval='';render();}

// Completions
function markDone(taskId,cid){
  const task=S.tasks.find(t=>t.id===taskId);if(!task)return;
  S.done.add(`${cid}-${taskId}`);
  if(task.pay&&task.amt&&cid)S.earnings[cid]=(S.earnings[cid]||0)+parseFloat(task.amt||0);
  const child=S.children.find(c=>c.id===cid);
  notifyDone(child?.name||'',task.name,task.pay?task.amt:'',false);
  stopTimer();render();
}
function resetEarnings(cid){
  S.earnings[cid]=0;S.tasks.forEach(t=>{S.done.delete(`${cid}-${t.id}`);S.expired.delete(`${cid}-${t.id}`);});
  S.jobs.filter(j=>j.claimedBy===cid).forEach(j=>{j.done=false;});
  S.infractions=S.infractions.filter(x=>x.childId!==cid);render();
}
function clearInfractions(){S.infractions=[];render();}
function clearNotifications(){S.notifications=[];render();}
function sendWANotif(nid){const n=S.notifications.find(x=>x.id===nid);if(n){n.sent=true;sendWA(n.msg);render();}}
function sendSMSNotif(nid){const n=S.notifications.find(x=>x.id===nid);if(n){n.sent=true;sendSMS(n.msg);render();}}
function lockDevice(cid){S.deviceChild=cid;S.childId=cid;S.view='child';reqWL();render();}
function unlockDevice(){S.deviceChild=null;S.view='parent';relWL();render();}
function askPin(cb){S.pinCallback=cb;document.getElementById('pinOverlay').style.display='flex';document.getElementById('pinInput').value='';document.getElementById('pinErr').style.display='none';setTimeout(()=>document.getElementById('pinInput').focus(),100);}
function submitPin(){const v=document.getElementById('pinInput').value;if(v===S.parentPin){document.getElementById('pinOverlay').style.display='none';if(S.pinCallback)S.pinCallback();S.pinCallback=null;}else{document.getElementById('pinErr').style.display='block';document.getElementById('pinInput').value='';}}
function cancelPin(){document.getElementById('pinOverlay').style.display='none';S.pinCallback=null;}
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitPin();});

// ─────────────────────────────────────────────────────────────────────────────
// TIMERS
// ─────────────────────────────────────────────────────────────────────────────
let tint=null;
function startTimer(){stopTimer();tint=setInterval(()=>{const st=document.getElementById('sbt');if(st)st.textContent=tstr();if(S.detailId!==null){const t=S.detailType==='job'?S.jobs.find(x=>x.id===S.detailId):S.tasks.find(x=>x.id===S.detailId);updateProgBar(t||{due:''});}},1000);}
function stopTimer(){if(tint){clearInterval(tint);tint=null;}}
setInterval(()=>{const el=document.getElementById('sbt');if(el)el.textContent=tstr();},15000);

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
startExpiryEngine();
initFirebase(); // no-op when FIREBASE_CONFIG.databaseURL is empty
render();
</script>
</body>
</html>
